<!DOCTYPE html>
<html>
<head>
<title>Anstin AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#343541;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#202123;
padding:15px;
text-align:center;
font-size:20px;
}

#chat{
flex:1;
overflow:auto;
padding:15px;
display:flex;
flex-direction:column;
}

.message{
padding:12px;
border-radius:10px;
margin:6px 0;
max-width:80%;
}

.user{
background:#2563eb;
align-self:flex-end;
}

.ai{
background:#444654;
align-self:flex-start;
}

#inputArea{
display:flex;
padding:10px;
background:#202123;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:6px;
}

button{
margin-left:10px;
padding:12px;
border:none;
border-radius:6px;
background:#19c37d;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<header>Anstin AI</header>

<div id="chat"></div>

<div id="inputArea">
<input id="prompt" placeholder="Message Anstin AI...">
<button onclick="send()">Send</button>
</div>

<script>

const API_KEY = "AIzaSyBSpaPl56-cMTHAx9WpQT_V0YBNS58P374";

async function send(){

let input = document.getElementById("prompt").value;

if(!input) return;

let chat = document.getElementById("chat");

let userMsg = document.createElement("div");
userMsg.className="message user";
userMsg.innerText=input;
chat.appendChild(userMsg);

document.getElementById("prompt").value="";

let loading = document.createElement("div");
loading.className="message ai";
loading.innerText="Thinking...";
chat.appendChild(loading);

chat.scrollTop = chat.scrollHeight;

try{

let response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{text:input}
]
}
]
})
}
);

let data = await response.json();

loading.remove();

let reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || "No response";

let aiMsg = document.createElement("div");
aiMsg.className="message ai";
aiMsg.innerText=reply;

chat.appendChild(aiMsg);

}catch(err){

loading.innerText="Error connecting to AI";

}

chat.scrollTop = chat.scrollHeight;

}

</script>

</body>
</html>
