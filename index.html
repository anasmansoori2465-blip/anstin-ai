<!DOCTYPE html>
<html>
<head>
<title>Anstin AI</title>

<style>
body{
font-family:Arial;
background:#111827;
color:white;
text-align:center;
}

#chat{
width:80%;
height:400px;
border:1px solid white;
margin:auto;
overflow:auto;
padding:10px;
}

input{
width:60%;
padding:10px;
}

button{
padding:10px;
}
</style>

</head>

<body>

<h1>Anstin AI</h1>

<div id="chat"></div>

<input id="userInput" placeholder="Ask something">
<button onclick="send()">Send</button>

<script>

async function send(){

let input=document.getElementById("userInput").value

let chat=document.getElementById("chat")

chat.innerHTML+="<p><b>You:</b> "+input+"</p>"

let response=await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=AIzaSyBSpaPl56-cMTHAx9WpQT_V0YBNS58P374",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{text:input}
]
}
]
})
})

let data=await response.json()

let reply=data.candidates[0].content.parts[0].text

chat.innerHTML+="<p><b>Anstin AI:</b> "+reply+"</p>"

}

</script>

</body>
  </html>
